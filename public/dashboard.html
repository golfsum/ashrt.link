<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Dashboard · ashrt.link</title>
  </head>
  <body data-page="dashboard">
    <div class="app">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main">
        <div class="main-inner">
          <header class="topbar">
            <div>
              <h1 id="greeting">Welcome</h1>
              <p class="sub">Track every click and understand where your traffic comes from.</p>
            </div>
            <div class="actions">
              <button id="create-link" class="btn">Create Link</button>
              <button id="create-qr" class="btn btn-ghost">Create QR Code</button>
            </div>
          </header>

          <section class="cards">
            <div class="card metric">
              <div class="label">Total Links</div>
              <div id="m-links" class="value">0</div>
            </div>
            <div class="card metric">
              <div class="label">Total Clicks</div>
              <div id="m-clicks" class="value">0</div>
            </div>
            <div class="card metric">
              <div class="label">Unique Visitors</div>
              <div id="m-visitors" class="value">0</div>
            </div>
            <div class="card metric">
              <div class="label">Campaigns</div>
              <div id="m-campaigns" class="value">0</div>
            </div>
          </section>

          <section class="panel-card">
            <div class="panel-head">
              <h2>Clicks Over Time</h2>
              <div class="segment" id="range">
                <button data-days="1">Today</button>
                <button data-days="7" class="active">7 Days</button>
                <button data-days="30">30 Days</button>
                <button data-days="90">90 Days</button>
              </div>
            </div>
            <div id="chart-clicks" class="chart-wrap"></div>
          </section>

          <div class="grid-2">
            <section class="panel-card">
              <div class="panel-head"><h2>Most Clicked Links</h2><a href="#" data-soon class="head-link">View all</a></div>
              <div id="top-links"></div>
            </section>
            <section class="panel-card">
              <div class="panel-head"><h2>Recent Activity</h2></div>
              <div id="activity"></div>
            </section>
          </div>

          <div class="grid-3">
            <section class="panel-card">
              <div class="panel-head"><h2>Top Referrers</h2></div>
              <div id="referrers"></div>
            </section>
            <section class="panel-card">
              <div class="panel-head"><h2>Devices</h2></div>
              <div id="devices"></div>
            </section>
            <section class="panel-card">
              <div class="panel-head"><h2>Top Countries</h2></div>
              <div id="countries"></div>
            </section>
          </div>
        </div>
      </main>
    </div>

    <div id="modal" class="modal-backdrop">
      <div class="modal">
        <h3>Create a link</h3>
        <input id="m-url" type="text" placeholder="https://example.com/your/long/link" />
        <input id="m-alias" class="mono" type="text" placeholder="custom name (optional)" />
        <div id="m-err" class="auth-err"></div>
        <div class="modal-actions">
          <button id="m-cancel" class="btn btn-ghost">Cancel</button>
          <button id="m-create" class="btn">Create</button>
        </div>
      </div>
    </div>

    <script src="/shell.js"></script>
    <script src="/charts.js"></script>
    <script src="/dashboard.js"></script>
  </body>
</html>
