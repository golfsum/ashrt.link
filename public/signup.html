<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Sign up · ashrt.link</title>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="logo" href="/">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="8" fill="#14141b" stroke="#2a2a38" />
            <path d="M13 19l6-6M12.5 14.5l-2 2a3.5 3.5 0 0 0 5 5l2-2M19.5 17.5l2-2a3.5 3.5 0 0 0-5-5l-2 2"
              fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" />
          </svg>
          ashrt<span class="dot">.link</span>
        </a>
      </header>

      <div class="auth-card">
        <h1 id="title">Create your account</h1>
        <p class="auth-sub" id="subtitle">Free forever for personal use.</p>

        <div id="oauth" class="oauth"></div>
        <div id="divider" class="divider"><span>or</span></div>

        <form id="form" class="auth-form">
          <input id="name" type="text" placeholder="Name" autocomplete="name" />
          <input id="email" type="email" placeholder="Email" autocomplete="email" required />
          <input id="password" type="password" placeholder="Password (8+ characters)" autocomplete="new-password" required />
          <div id="err" class="auth-err"></div>
          <button id="submit" class="btn btn-block" type="submit">Create account</button>
        </form>

        <p class="auth-switch">
          <span id="switch-text">Already have an account?</span>
          <a id="switch-link" href="/login">Log in</a>
        </p>
      </div>

      <footer>
        <span>ashrt.link &middot; your links, your numbers.</span>
        <span class="foot-links"><a href="/privacy">Privacy</a> &middot; <a href="/terms">Terms</a></span>
      </footer>
    </div>

    <script src="/auth.js"></script>
  </body>
</html>
