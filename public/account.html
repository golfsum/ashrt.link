<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Billing · ashrt.link</title>
  </head>
  <body data-page="billing">
    <div class="app">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <div class="main-inner">
          <header class="topbar">
            <div>
              <h1>Billing</h1>
              <p class="sub">Your plan and account details.</p>
            </div>
          </header>

          <section class="panel-card">
            <div class="panel-head"><h2>Account</h2></div>
            <div class="set-row"><label>Email</label><div id="email" class="set-static mono">—</div></div>
            <div class="set-row"><label>Sign-in method</label><div id="provider" class="set-static">—</div></div>
            <div class="set-row"><label>Plan</label><div><span id="plan" class="plan-tag">Free</span></div></div>
          </section>

          <section class="panel-card" style="margin-top:16px">
            <div class="panel-head"><h2>Plan &amp; billing</h2></div>
            <p id="billing-note" class="panel-sub"></p>
            <div id="plan-options" class="plan-options"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/shell.js"></script>
    <script src="/account.js"></script>
  </body>
</html>
