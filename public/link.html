<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Link analytics · ashrt.link</title>
  </head>
  <body data-page="links">
    <div class="app">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <div class="main-inner">
          <a href="/links" class="back-link">← Back to links</a>
          <header class="topbar">
            <div>
              <h1 id="title" class="mono">/—</h1>
              <p class="sub"><a id="dest" href="#" target="_blank" rel="noreferrer" class="dest-link">—</a></p>
            </div>
            <div class="actions">
              <button id="copy" class="btn btn-ghost">Copy</button>
              <button id="qr" class="btn btn-ghost">QR code</button>
            </div>
          </header>

          <section class="cards">
            <div class="card metric"><div class="label">Clicks</div><div id="m-clicks" class="value">0</div></div>
            <div class="card metric"><div class="label">Unique Visitors</div><div id="m-visitors" class="value">0</div></div>
            <div class="card metric"><div class="label">Top Country</div><div id="m-country" class="value">—</div></div>
            <div class="card metric"><div class="label">Top Device</div><div id="m-device" class="value">—</div></div>
          </section>

          <section class="panel-card">
            <div class="panel-head">
              <h2>Clicks Over Time</h2>
              <div class="segment" id="range">
                <button data-days="7" class="active">7 Days</button>
                <button data-days="30">30 Days</button>
                <button data-days="90">90 Days</button>
              </div>
            </div>
            <div id="chart-clicks" class="chart-wrap"></div>
          </section>

          <div class="grid-3">
            <section class="panel-card"><div class="panel-head"><h2>Traffic Sources</h2></div><div id="referrers"></div></section>
            <section class="panel-card"><div class="panel-head"><h2>Devices</h2></div><div id="devices"></div></section>
            <section class="panel-card"><div class="panel-head"><h2>Countries</h2></div><div id="countries"></div></section>
          </div>
        </div>
      </main>
    </div>

    <div id="qr-modal" class="modal-backdrop">
      <div class="modal">
        <h3>QR code</h3>
        <div id="qr-preview" class="qr-preview"></div>
        <div id="qr-target" class="qr-target mono"></div>
        <div class="modal-actions qr-actions">
          <a id="qr-png" class="btn btn-ghost" href="#">PNG</a>
          <a id="qr-svg" class="btn btn-ghost" href="#">SVG</a>
          <button id="qr-close" class="btn">Done</button>
        </div>
      </div>
    </div>

    <script src="/shell.js"></script>
    <script src="/charts.js"></script>
    <script src="/link.js"></script>
  </body>
</html>
